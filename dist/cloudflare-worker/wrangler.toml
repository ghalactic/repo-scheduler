name = "ghalactic-repo-scheduler"
main = "dist/index.js"
compatibility_date = "2025-05-23"

[triggers]
crons = ["*/30 * * * *"]

[vars]
GITHUB_APP_ID = ""
GITHUB_REPO = ""
GITHUB_EVENT_TYPE = ""
GITHUB_PAYLOAD = "{}"

[[secrets_store_secrets]]
binding = "GITHUB_APP_PK"
store_id = "ghalactic-repo-scheduler"
secret_name = "github-app-pk"
