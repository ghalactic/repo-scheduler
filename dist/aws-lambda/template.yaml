AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Ghalactic repo scheduler

Metadata:
  AWS::ServerlessRepo::Application:
    Name: ghalactic-repo-scheduler
    Description: >-
      External scheduler for GitHub repos that triggers a repository dispatch
      event on a configurable schedule.
    Author: ghalactic
    SpdxLicenseId: MIT
    ReadmeUrl: README.md
    LicenseUrl: LICENSE
    HomePageUrl: https://github.com/ghalactic/repo-scheduler
    SourceCodeUrl: https://github.com/ghalactic/repo-scheduler
    SemanticVersion: 0.0.0

Parameters:
  GitHubAppId:
    Type: String
    Description: GitHub App numeric ID
  Schedule:
    Type: String
    Default: cron(21 * * * ? *)
    Description: EventBridge schedule expression
  TargetRepo:
    Type: String
    Description: Target repository in owner/repo format
  TargetEventType:
    Type: String
    Description: repository_dispatch event type string
  TargetPayload:
    Type: String
    Default: "{}"
    Description: JSON object to include in the dispatch event

Resources:
  GitHubAppPkSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/private-key"
      Description: GitHub App PEM-encoded private key

  SchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: dist/index.handler
      Runtime: nodejs24.x
      Timeout: 30
      Environment:
        Variables:
          GITHUB_APP_ID: !Ref GitHubAppId
          GITHUB_APP_PK: !Ref GitHubAppPkSecret
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref GitHubAppPkSecret

  SchedulerInvocationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeSchedulerFunction
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SchedulerFunction.Arn

  DefaultSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      FlexibleTimeWindow:
        Mode: OFF
      ScheduleExpression: !Ref Schedule
      Target:
        Arn: !GetAtt SchedulerFunction.Arn
        RoleArn: !GetAtt SchedulerInvocationRole.Arn
        Input: !Sub '{"repo":"${TargetRepo}","eventType":"${TargetEventType}","payload":${TargetPayload}}'
        RetryPolicy:
          MaximumRetryAttempts: 3

Outputs:
  SecretArn:
    Description: ARN of the secret. Populate it with your GitHub App private key.
    Value: !Ref GitHubAppPkSecret
  FunctionArn:
    Description: ARN of the Lambda function. Use as target for additional schedules.
    Value: !GetAtt SchedulerFunction.Arn
  ScheduleRoleArn:
    Description: ARN of the EventBridge Scheduler role. Use for additional schedules.
    Value: !GetAtt SchedulerInvocationRole.Arn
